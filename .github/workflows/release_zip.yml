name: Create Release ZIP

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach the ZIP to (e.g. v2.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Create Release Asset
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Create ZIP file
        run: |
          cd custom_components/ocado
          zip -r "$GITHUB_WORKSPACE/ocado.zip" . -x '*/__pycache__/*' '*.pyc'

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" "$GITHUB_WORKSPACE/ocado.zip" --clobber
