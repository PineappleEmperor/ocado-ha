name: Create Release ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Create Release Asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Create ZIP file
        run: |
          cd custom_components/ocado
          zip -r "$GITHUB_WORKSPACE/ocado.zip" . -x '*/__pycache__/*' '*.pyc'

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$GITHUB_WORKSPACE/ocado.zip" --clobber
