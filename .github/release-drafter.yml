name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
# Sole labeler: the release-drafter autolabeler (run from pr-labeler.yml), keyed on the
# PR TITLE only — create-dev-pr.yml sets the title to the winning commit type
# (feat > fix > last), so labelling is effectively commit-driven. No branch rules (they
# flap when the branch name disagrees with the commits). The breaking `!` rule must
# precede `feature`, else `feat!` is swallowed as a minor `feature`.
autolabeler:
  - label: "xfeat"
    title:
      - '/^\w+(\(.+\))?!:/'
  - label: "chore"
    title:
      - '/^(chore|docs)(\(.+\))?:/i'
  - label: "fix"
    title:
      - '/^fix(\(.+\))?:/i'
  - label: "feature"
    title:
      - '/^(feat|feature)(\(.+\))?:/i'
categories:
  - title: '🚨 Breaking Change'
    labels:
      - 'xfeat'
      - 'xfeature'
      - 'major'
  - title: '🚀 Features'
    labels:
      - 'feat'
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧰 Maintenance'
    label: 'chore'
change-template: |-
  - $TITLE @$AUTHOR (#$NUMBER)
  $BODY
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
# release-drafter has no per-category change-template, so $BODY is inlined for ALL PRs —
# including Dependabot's. Human PRs carry create-dev-pr's grouped mini-changelog; these
# bounded replacers scrub Dependabot's body fluff (folds, compat badge, command block) so
# it doesn't leak into the notes. All patterns are bounded (no end-of-string anchor) so
# they can't bleed across concatenated PR bodies. Revisit if Dependabot changes its format.
replacers:
  - search: '/<details>[\s\S]*?<\/details>\s*/g'
    replace: ''
  - search: '/\[!\[Dependabot compatibility score\][^\n]*\n?/g'
    replace: ''
  - search: '/Dependabot will resolve[^\n]*\n?/g'
    replace: ''
  - search: '/\/\/: # \(dependabot-start\)[\s\S]*?\/\/: # \(dependabot-end\)\s*/g'
    replace: ''
  - search: '/<br\s*\/?>\s*/g'
    replace: ''
version-resolver:
  major:
    labels:
      - 'major'
      - 'xfeature'
      - 'xfeat'
  minor:
    labels:
      - 'feat'
      - 'feature'
      - 'minor'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'chore'
      - 'bugfix'
      - 'bug'
  default: patch
template: |
  ## Changes

  $CHANGES
